<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Suite</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --ink: #2b2a28;
            --accent: #2f7d32;
            --accent-strong: #1f5c23;
            --tab: #dfd4c3;
            --grid: #5b5146;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Verdana", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background:
                radial-gradient(circle at top, #fff9ef 0%, #f4efe6 48%, #e7dfd1 100%);
            color: var(--ink);
            padding: 24px 16px 40px;
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 20px;
            text-align: center;
            max-width: 640px;
        }

        .tabs,
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tabs {
            margin: 8px 0 18px;
        }

        .tab,
        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            cursor: pointer;
            font: inherit;
            transition: transform 120ms ease, background 120ms ease;
        }

        .tab {
            background: var(--tab);
            color: var(--ink);
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: bold;
        }

        button:hover,
        .tab:hover {
            transform: translateY(-1px);
        }

        .solve-btn {
            background: var(--accent);
            color: #fff;
        }

        .solve-btn:hover {
            background: var(--accent-strong);
        }

        .card {
            background: rgba(255, 250, 242, 0.92);
            border: 1px solid rgba(91, 81, 70, 0.18);
            border-radius: 24px;
            box-shadow: 0 14px 36px rgba(64, 53, 39, 0.12);
            padding: 20px;
            max-width: 100%;
        }

        .instructions {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(223, 212, 195, 0.42);
            line-height: 1.45;
        }

        .instructions h2 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .instructions p {
            margin: 0 0 8px;
        }

        .instructions ul,
        .instructions ol {
            margin: 0;
            padding-left: 20px;
        }

        .instructions li + li {
            margin-top: 6px;
        }

        .grid {
            display: grid;
            gap: 2px;
            background: var(--grid);
            border: 4px solid var(--grid);
            border-radius: 14px;
            width: fit-content;
            max-width: 100%;
            overflow: auto;
        }

        .cell {
            width: 42px;
            height: 42px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
        }

        .color-1 {
            background: #222 !important;
            color: #fff;
        }

        .color-2,
        .color-3 {
            background: #ff7b7b !important;
            color: #fff;
        }

        .color-4,
        .color-5 {
            background: #fff6c8 !important;
            color: #534400;
        }

        .color-6,
        .color-7 {
            background: #7cc7ff !important;
            color: #08324d;
        }

        .color-8,
        .color-9 {
            background: #cab8ff !important;
            color: #2b175c;
        }

        .status {
            min-height: 24px;
            text-align: center;
            font-weight: bold;
            margin: 16px 0 0;
        }

        @media (max-width: 640px) {
            .cell {
                width: 36px;
                height: 36px;
                font-size: 11px;
            }

            .card {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <h1>Puzzle Suite</h1>
    <p class="subtitle">Pick a puzzle, tap the black squares, and let the page solve the tiling right in the browser.</p>

    <div class="tabs">
        <button class="tab active" type="button" data-game-id="8x8_classic">8x8 Classic</button>
        <button class="tab" type="button" data-game-id="6x6_mini">6x6 Mini</button>
    </div>

    <div class="controls">
        <button class="solve-btn" type="button" id="solve-btn">Solve</button>
        <button type="button" id="reset-btn">Reset</button>
    </div>

    <div class="card">
        <section class="instructions" aria-label="Game instructions">
            <h2>How to Play</h2>
            <div id="instructions-content"></div>
        </section>
        <div id="grid-container"></div>
        <p class="status" id="status"></p>
    </div>

    <script>
        const games = {
            "8x8_classic": {
                size: 8,
                clicks: 6,
                blocks: [[1, 4], [1, 5], [2, 2], [3, 3], [2, 3], [2, 4], [2, 5], [3, 4]],
                instructions: `
                    <p><strong>8x8 Classic</strong> starts by asking the player to create the black area first.</p>
                    <p>For this puzzle, the black area must represent these three starting blocks placed randomly on the board:</p>
                    <ul>
                        <li>one <strong>1x1</strong> block</li>
                        <li>one <strong>1x2</strong> block</li>
                        <li>one <strong>1x3</strong> block</li>
                    </ul>
                    <p>That means the player must tap exactly <strong>6 squares</strong> in total.</p>
                    <p>After that, press <strong>Solve</strong>. The game will try to fill all remaining spaces using exactly these remaining blocks:</p>
                    <ul>
                        <li><strong>1x4</strong> and <strong>1x5</strong></li>
                        <li><strong>2x2</strong>, <strong>2x3</strong>, <strong>2x4</strong>, and <strong>2x5</strong></li>
                        <li><strong>3x3</strong> and <strong>3x4</strong></li>
                    </ul>
                    <p>If the rest of the board can be tiled perfectly with those pieces, the pattern works.</p>
                `
            },
            "6x6_mini": {
                size: 6,
                clicks: 3,
                blocks: [[2, 2], [2, 3], [3, 3], [1, 4], [2, 4]],
                instructions: `
                    <p><strong>6x6 Mini</strong> is a smaller version of the same idea.</p>
                    <p>Tap exactly <strong>3 squares</strong> to create the black starting area, then press <strong>Solve</strong>.</p>
                    <p>The game checks whether the rest of the board can be filled exactly using these blocks:</p>
                    <ul>
                        <li><strong>2x2</strong>, <strong>2x3</strong>, and <strong>2x4</strong></li>
                        <li><strong>3x3</strong></li>
                        <li><strong>1x4</strong></li>
                    </ul>
                    <p>Use <strong>Reset</strong> to try a new arrangement.</p>
                `
            }
        };

        let currentGame = "8x8_classic";
        let selected = [];

        function createBoard(size) {
            return Array.from({ length: size }, () => Array(size).fill(0));
        }

        function canPlace(board, row, col, width, height, size) {
            if (row + height > size || col + width > size) {
                return false;
            }

            for (let r = row; r < row + height; r += 1) {
                for (let c = col; c < col + width; c += 1) {
                    if (board[r][c] !== 0) {
                        return false;
                    }
                }
            }
            return true;
        }

        function place(board, row, col, width, height, value) {
            for (let r = row; r < row + height; r += 1) {
                for (let c = col; c < col + width; c += 1) {
                    board[r][c] = value;
                }
            }
        }

        function blockId(fullList, width, height) {
            return fullList.findIndex(([w, h]) => w === width && h === height) + 2;
        }

        function solve(board, blocksLeft, fullList, size) {
            if (blocksLeft.length === 0) {
                return true;
            }

            for (let row = 0; row < size; row += 1) {
                for (let col = 0; col < size; col += 1) {
                    if (board[row][col] !== 0) {
                        continue;
                    }

                    for (let i = 0; i < blocksLeft.length; i += 1) {
                        const [blockWidth, blockHeight] = blocksLeft[i];
                        const orientations = blockWidth === blockHeight
                            ? [[blockWidth, blockHeight]]
                            : [[blockWidth, blockHeight], [blockHeight, blockWidth]];
                        const originalId = blockId(fullList, blockWidth, blockHeight);

                        for (const [width, height] of orientations) {
                            if (!canPlace(board, row, col, width, height, size)) {
                                continue;
                            }

                            place(board, row, col, width, height, originalId);
                            const remainingBlocks = blocksLeft.slice(0, i).concat(blocksLeft.slice(i + 1));
                            if (solve(board, remainingBlocks, fullList, size)) {
                                return true;
                            }
                            place(board, row, col, width, height, 0);
                        }
                    }

                    return false;
                }
            }

            return true;
        }

        function renderBoard() {
            const { size, clicks } = games[currentGame];
            const container = document.getElementById("grid-container");
            container.innerHTML = "";
            document.getElementById("instructions-content").innerHTML = games[currentGame].instructions;

            const grid = document.createElement("div");
            grid.className = "grid";
            grid.style.gridTemplateColumns = `repeat(${size}, minmax(36px, 42px))`;

            for (let row = 0; row < size; row += 1) {
                for (let col = 0; col < size; col += 1) {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.id = `cell-${row}-${col}`;
                    cell.addEventListener("click", () => toggleCell(row, col, cell, clicks));
                    grid.appendChild(cell);
                }
            }

            container.appendChild(grid);
            document.getElementById("status").textContent = `Select ${clicks} cells.`;
        }

        function resetBoardColors() {
            document.querySelectorAll(".cell").forEach((cell) => {
                cell.className = "cell";
                cell.textContent = "";
            });
        }

        function initGame() {
            selected = [];
            renderBoard();
        }

        function toggleCell(row, col, element, max) {
            const selectedIndex = selected.findIndex(([r, c]) => r === row && c === col);

            if (selectedIndex > -1) {
                selected.splice(selectedIndex, 1);
                element.classList.remove("color-1");
                return;
            }

            if (selected.length >= max) {
                return;
            }

            selected.push([row, col]);
            element.classList.add("color-1");
        }

        function paintSolution(board) {
            board.forEach((row, rowIndex) => {
                row.forEach((value, colIndex) => {
                    const cell = document.getElementById(`cell-${rowIndex}-${colIndex}`);
                    cell.className = `cell color-${value}`;
                    cell.textContent = value > 1 ? value - 1 : "";
                });
            });
        }

        function runSolver() {
            const config = games[currentGame];
            if (selected.length !== config.clicks) {
                document.getElementById("status").textContent = `Select ${config.clicks} cells.`;
                return;
            }

            resetBoardColors();
            selected.forEach(([row, col]) => {
                document.getElementById(`cell-${row}-${col}`).classList.add("color-1");
            });

            const board = createBoard(config.size);
            selected.forEach(([row, col]) => {
                board[row][col] = 1;
            });

            const solved = solve(board, config.blocks, config.blocks, config.size);
            if (solved) {
                paintSolution(board);
                document.getElementById("status").textContent = "Solved!";
            } else {
                document.getElementById("status").textContent = "No solution found.";
            }
        }

        document.querySelectorAll(".tab").forEach((button) => {
            button.addEventListener("click", () => {
                currentGame = button.dataset.gameId;
                document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));
                button.classList.add("active");
                initGame();
            });
        });

        document.getElementById("solve-btn").addEventListener("click", runSolver);
        document.getElementById("reset-btn").addEventListener("click", initGame);

        initGame();
    </script>
</body>
</html>
